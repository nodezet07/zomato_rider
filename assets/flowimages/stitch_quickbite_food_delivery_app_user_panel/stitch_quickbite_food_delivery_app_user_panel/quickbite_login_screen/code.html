<!-- Micro-interaction Scripts -->
<script>
        // Password visibility toggle
        const toggleBtn = document.querySelector('button.material-symbols-outlined.right-4');
        const passInput = document.querySelector('input[type="password"]');
        
        toggleBtn?.addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            toggleBtn.textContent = isPass ? 'visibility_off' : 'visibility';
        });

        // Simple button active state effect
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', () => btn.classList.add('scale-95'));
            btn.addEventListener('touchend', () => btn.classList.remove('scale-95'));
        });
    </script>
