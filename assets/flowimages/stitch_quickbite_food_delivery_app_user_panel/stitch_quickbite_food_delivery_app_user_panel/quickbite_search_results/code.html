<script>
        // Simple micro-interaction for chips
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                if(this.classList.contains('bg-white')) {
                    this.classList.remove('bg-white', 'text-secondary');
                    this.classList.add('bg-primary-container', 'text-white');
                } else if(this.classList.contains('bg-primary-container') && !this.closest('div.fixed')) {
                    this.classList.add('bg-white', 'text-secondary');
                    this.classList.remove('bg-primary-container', 'text-white');
                }
            });
        });
