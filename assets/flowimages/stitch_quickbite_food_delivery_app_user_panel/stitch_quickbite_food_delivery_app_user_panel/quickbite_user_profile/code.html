<script>
        // Simple Interaction: Toggle Dark Mode (Visual Only)
        const darkModeToggle = document.querySelector('input[type="checkbox"]');
        darkModeToggle.addEventListener('change', (e) => {
            if (e.target.checked) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        });

        // Soft interaction for buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', () => btn.classList.add('opacity-80'));
            btn.addEventListener('touchend', () => btn.classList.remove('opacity-80'));
        });
    </script>
