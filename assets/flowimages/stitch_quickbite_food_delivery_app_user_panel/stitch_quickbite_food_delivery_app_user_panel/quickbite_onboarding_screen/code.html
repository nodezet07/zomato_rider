<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>QuickBite Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">

                    "secondary-container": "#dae1e3",

                    "tertiary-fixed-dim": "#4bddb7",
                    "tertiary-fixed": "#6dfad2",
                    "primary": "#a83900",
                    "surface-container-low": "#f3f3f3",
                    "on-tertiary-fixed-variant": "#005140",
                    "surface-bright": "#f9f9f9",
                    "primary-fixed": "#ffdbcf",
                    "surface-container-highest": "#e2e2e2",
                    "outline": "#907065",
                    "secondary-fixed-dim": "#c1c8ca",
                    "on-surface-variant": "#5b4137",
                    "inverse-primary": "#ffb59a",
                    "primary-fixed-dim": "#ffb59a",
                    "outline-variant": "#e4beb1",
                    "tertiary": "#006b55",
                    "on-error": "#ffffff",
                    "on-surface": "#1a1c1c",
                    "on-secondary-fixed": "#161d1f",
                    "on-tertiary-container": "#003126",
                    "on-background": "#1a1c1c",
                    "error": "#ba1a1a",
                    "surface-dim": "#dadada",
                    "secondary": "#586062",
                    "on-error-container": "#93000a",
                    "on-secondary-fixed-variant": "#41484a",
                    "surface": "#f9f9f9",
                    "primary-container": "#ff5a00",

                    "on-secondary-container": "#5d6466",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "surface-container-high": "#e8e8e8",
                    "error-container": "#ffdad6",
                    "surface-tint": "#a83900",
                    "on-tertiary-fixed": "#002018",
                    "background": "#f9f9f9",
                    "on-primary-fixed-variant": "#802900",
                    "on-primary-fixed": "#380d00",
                    "on-primary-container": "#511700",
                    "tertiary-container": "#00a584",
                    "secondary-fixed": "#dde4e6",

            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"

            "spacing": {
                    "container-margin-desktop": "80px",
                    "base": "4px",
                    "md": "16px",
                    "container-margin-mobile": "16px",
                    "xl": "32px",
                    "lg": "24px",
                    "sm": "8px",
                    "gutter": "16px",
                    "xs": "4px"
            },
            "fontFamily": {
                    "label-sm": ["Plus Jakarta Sans"],
                    "title-lg": ["Plus Jakarta Sans"],
                    "body-lg": ["Plus Jakarta Sans"],
                    "headline-lg": ["Plus Jakarta Sans"],
                    "headline-md": ["Plus Jakarta Sans"],
                    "body-md": ["Plus Jakarta Sans"],
                    "headline-lg-mobile": ["Plus Jakarta Sans"],
                    "display-lg": ["Plus Jakarta Sans"],
                    "label-md": ["Plus Jakarta Sans"]

            "fontSize": {
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                    "title-lg": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],

                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}]

          },
        },
      }

<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f9f9f9;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pagination-dot {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .active-dot {
            width: 24px;
            background-color: #ff5a00;
        }
        .inactive-dot {
            width: 8px;
            background-color: #e2e2e2;
        }
        /* Custom scroll-snap for future expansion */
        .onboarding-container {
            height: 100vh;
            width: 100%;
            overflow: hidden;
            position: relative;
        }
        .glass-overlay {
            background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.1) 100%);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-surface-container">
<!-- Mobile Frame Emulation (390x844) -->
<main class="relative w-[390px] h-[844px] bg-white overflow-hidden shadow-2xl rounded-[3rem] border-[8px] border-on-surface">
<!-- Status Bar Emulation -->
<div class="absolute top-0 left-0 w-full h-11 flex justify-between items-center px-8 z-50">
<span class="text-on-surface font-semibold text-sm">9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-[18px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[18px]">wifi</span>
<span class="material-symbols-outlined text-[18px]">battery_full</span>
</div>
</div>
<!-- Full-bleed Illustration Background -->
<div class="absolute inset-0 w-full h-full">
<div class="w-full h-full bg-center bg-cover bg-no-repeat" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAh6jnpV9mNL4yBUXBO6BAKc3GzWflRobRRKcBgq5DFpclK22Mh1BWQXN8_fGYEvXtz66GZqUpNuzxycxCfsccRVKL_bccZiM84nPAy69qQwMidLD1rvjNrydA7ljbQRs3lcgK-m8zjQZwipNp3mSWfBIovHNSnqdN-Kf75aEZgkMdnooV8QYeIQPniqK4lxNq5eX5BrmAIXjyVccUx9HbHk7lfndWnL3ToiIKkrHMv3p89qTFWsVddQBay6KL_3EOkZN8Rfyf9-0I');">
</div>
<!-- Subtle gradient to ensure top UI remains visible -->
<div class="absolute inset-0 bg-gradient-to-b from-white/20 via-transparent to-transparent h-32"></div>
</div>
<!-- Bottom Sheet Card Panel -->
<section class="absolute bottom-0 left-0 w-full bg-surface-container-lowest rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.1)] pt-10 pb-8 px-8 flex flex-col items-center">
<!-- Handle Decorator -->
<div class="w-12 h-1.5 bg-surface-container-highest rounded-full absolute top-4"></div>
<!-- Text Content -->
<div class="text-center mb-xl">
<h1 class="font-headline-md text-headline-md text-on-surface mb-md leading-tight">
                    Order food from your favorite restaurants
                </h1>
<p class="font-body-md text-body-md text-secondary leading-relaxed">
                    Fast delivery at your doorstep in 30 minutes
                </p>
</div>
<!-- Pagination Dots -->
<div class="flex gap-2 mb-xl items-center">
<span class="pagination-dot active-dot h-2 rounded-full"></span>
<span class="pagination-dot inactive-dot h-2 rounded-full"></span>
<span class="pagination-dot inactive-dot h-2 rounded-full"></span>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-md">
<!-- Create Account Button -->
<button class="w-full py-4 bg-primary-container text-on-primary font-label-md text-label-md rounded-xl shadow-lg active:scale-95 transition-transform duration-150 flex justify-center items-center">
                    Create Account
                </button>
<!-- Log In Button -->
<button class="w-full py-4 border-2 border-primary-container text-primary-container font-label-md text-label-md rounded-xl active:scale-95 transition-transform duration-150 flex justify-center items-center">
                    Log In
                </button>
</div>
<!-- Safe Area Spacer -->
<div class="h-4"></div>
</section>
</main>
<script>
        // Micro-interaction: Button tap feedback
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('touchstart', () => {
                button.classList.add('scale-95');
            });
            button.addEventListener('touchend', () => {
                button.classList.remove('scale-95');
            });
        });

        // Floating particle effect or subtle movement for the illustration (optional)
        // Can be added here for extra polish
    </script>
</body></html>
