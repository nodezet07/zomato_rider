<body class="flex flex-col min-h-screen text-on-surface">

</header>
<main class="flex-grow flex flex-col px-container-margin-mobile pb-xl">
<!-- Illustration Section -->
<div class="flex justify-center items-center py-lg mt-sm">
<div class="relative w-48 h-48 flex items-center justify-center">
<!-- Decorative Glow Background -->
<div class="absolute inset-0 bg-primary-container opacity-5 blur-3xl rounded-full"></div>
<img alt="QuickBite OTP Verification Illustration" class="w-full h-full object-contain relative z-0" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDfTTl4xV-EY8eK-w3noaSrSCS0fM4hrd5WcKReCFw4AvCkmWvcezlLwp-oA38-_bo0ZXRvcC2GZPOZqHYjtjRNyeNMCEUXkjgFRBzIswtGGqrSD0fkhb9T3xfFLYROE3wbWoX6zwUYteET_nIYfNd-y8U2S0E2FIp7PsIAlSWhV3wf4n9k7o1XBrmeVxU8CxMxVeXLYSDi9rFoUh13dPNkWLVzG4vKh0BbSp2KeKpuYjxx50PAphmO4rgwj7KmBRuSRg7hzfimw4c">

<!-- OTP Input Row -->
<div class="flex justify-center gap-2 mb-lg" id="otp-container">
<input class="otp-input w-12 h-12 text-center text-title-lg font-title-lg border border-outline-variant rounded-lg bg-surface transition-all" data-index="0" maxlength="1" pattern="\d*" type="text">
<input class="otp-input w-12 h-12 text-center text-title-lg font-title-lg border border-outline-variant rounded-lg bg-surface transition-all" data-index="1" maxlength="1" pattern="\d*" type="text">
<input class="otp-input w-12 h-12 text-center text-title-lg font-title-lg border border-outline-variant rounded-lg bg-surface transition-all" data-index="2" maxlength="1" pattern="\d*" type="text">
<input class="otp-input w-12 h-12 text-center text-title-lg font-title-lg border border-outline-variant rounded-lg bg-surface transition-all" data-index="3" maxlength="1" pattern="\d*" type="text">
<input class="otp-input w-12 h-12 text-center text-title-lg font-title-lg border border-outline-variant rounded-lg bg-surface transition-all" data-index="4" maxlength="1" pattern="\d*" type="text">
<input class="otp-input w-12 h-12 text-center text-title-lg font-title-lg border border-outline-variant rounded-lg bg-surface transition-all" data-index="5" maxlength="1" pattern="\d*" type="text">
</div>
<!-- Timer & Resend -->

<p class="font-label-md text-secondary">
                Resend OTP in <span class="font-bold text-on-background" id="timer">00:45</span>
</p>
<button class="mt-base font-label-md text-primary opacity-50 cursor-not-allowed transition-colors" id="resend-btn" disabled="">
                Resend Code
            </button>
</div>
<!-- Spacer for push-down layout -->
<div class="flex-grow"></div>
<!-- Action Button -->
<div class="w-full">
<button class="w-full h-14 bg-primary-container text-white font-headline-md rounded-xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-sm">
                Verify &amp; Continue
                <span class="material-symbols-outlined text-[20px]">chevron_right</span>
</button>
<p class="mt-md text-center font-label-sm text-secondary opacity-60">
                By continuing, you agree to our <a class="underline" href="#">Terms of Service</a>
</p>

</main>
<script>
        // OTP Focus Logic
        const inputs = document.querySelectorAll('.otp-input');
        
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.inputType === 'deleteContentBackward') return;
                if (input.value && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // Timer Logic
        let timeLeft = 45;
        const timerElement = document.getElementById('timer');
        const resendBtn = document.getElementById('resend-btn');

        const countdown = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerElement.innerText = "00:00";
                resendBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                resendBtn.classList.add('hover:text-on-primary-container');
                resendBtn.disabled = false;
            } else {
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerElement.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
        }, 1000);

        // Simple feedback on button click
        resendBtn.addEventListener('click', () => {
            if (!resendBtn.disabled) {
                alert('OTP Resent successfully!');
                timeLeft = 45;
                resendBtn.disabled = true;
                resendBtn.classList.add('opacity-50', 'cursor-not-allowed');
            }
        });
    </script>
