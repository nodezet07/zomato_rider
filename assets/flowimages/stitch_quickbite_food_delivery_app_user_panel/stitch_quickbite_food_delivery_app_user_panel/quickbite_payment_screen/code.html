<div class="h-safe"></div>

<!-- Micro-interaction script -->
<script>
        document.querySelectorAll('input[name="payment_method"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                // Remove active classes from all cards
                document.querySelectorAll('.payment-card-active').forEach(card => {
                    card.classList.remove('payment-card-active');
                    card.classList.add('bg-white');
                    const upiInput = card.querySelector('.mt-lg');
                    if (upiInput) upiInput.classList.add('hidden');
                });
                
                // Add active classes to selected card
                const card = e.target.closest('div');
                card.classList.add('payment-card-active');
                card.classList.remove('bg-white');
                
                // Show UPI input if UPI is selected
                const upiInput = card.querySelector('.mt-lg');
                if (upiInput && e.target.closest('label').textContent.includes('UPI')) {
                    upiInput.classList.remove('hidden');
                }
            });
        });

        // Toggle order summary visibility animation
        const orderSummary = document.getElementById('orderSummary');
        orderSummary.addEventListener('click', () => {
            orderSummary.classList.toggle('ring-2');
            orderSummary.classList.toggle('ring-primary/20');
        });
    </script>
