<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>QuickBite - Set Location</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#1a1c1c",
                        "on-primary": "#ffffff",
                        "secondary-container": "#dae1e3",
                        "surface-tint": "#a83900",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed-variant": "#41484a",
                        "inverse-primary": "#ffb59a",
                        "on-primary-fixed-variant": "#802900",
                        "primary-fixed-dim": "#ffb59a",
                        "on-secondary-fixed": "#161d1f",
                        "on-tertiary-container": "#003126",
                        "surface-container-low": "#f3f3f3",
                        "on-primary-container": "#511700",
                        "background": "#f9f9f9",
                        "tertiary-fixed": "#6dfad2",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#380d00",
                        "primary-fixed": "#ffdbcf",
                        "on-surface-variant": "#5b4137",
                        "secondary-fixed": "#dde4e6",
                        "inverse-surface": "#2f3131",
                        "inverse-on-surface": "#f1f1f1",
                        "surface-variant": "#e2e2e2",
                        "on-background": "#1a1c1c",
                        "tertiary-fixed-dim": "#4bddb7",
                        "surface-container": "#eeeeee",
                        "primary-container": "#ff5a00",
                        "tertiary": "#006b55",
                        "surface-bright": "#f9f9f9",
                        "secondary-fixed-dim": "#c1c8ca",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#a83900",
                        "outline": "#907065",
                        "on-tertiary-fixed": "#002018",
                        "error": "#ba1a1a",
                        "on-secondary-container": "#5d6466",
                        "tertiary-container": "#00a584",
                        "surface-container-highest": "#e2e2e2",
                        "surface": "#f9f9f9",
                        "outline-variant": "#e4beb1",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#005140",
                        "on-error": "#ffffff",
                        "surface-container-high": "#e8e8e8",
                        "secondary": "#586062",
                        "surface-dim": "#dadada",
                        "on-error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-margin-desktop": "80px",
                        "xs": "4px",
                        "lg": "24px",
                        "container-margin-mobile": "16px",
                        "xl": "32px",
                        "md": "16px",
                        "sm": "8px",
                        "gutter": "16px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "title-lg": ["Plus Jakarta Sans"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "label-md": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "title-lg": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pin-shadow {
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }
        .custom-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .custom-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .map-pulse::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 12px;
            background: rgba(0,0,0,0.1);
            border-radius: 50%;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            z-index: -1;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col overflow-hidden">
<!-- Header Section (TopAppBar guidance) -->
<header class="fixed top-0 w-full z-20 flex justify-between items-center px-container-margin-mobile h-16 bg-transparent">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-lowest shadow-sm active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<div class="px-4 py-1 bg-surface-container-lowest rounded-full shadow-sm flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: 'FILL' 1;">location_on</span>
<span class="font-label-md text-label-md text-on-surface">New Delhi</span>
</div>
<div class="w-10 h-10"></div> <!-- Spacer -->
</header>
<!-- Map Background (Top 45%) -->
<div class="relative h-[45vh] w-full overflow-hidden">
<img alt="Urban map visualization" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCo0JxV7XFVMpZUAOCkdsPFQ43r4E_-UlHXQeBuDyEN40L6SyKJkD-fQ_z7L3l-QY2UqiLEitG1J8k1CLAWEF-mhRYcU41lrVgjsIEQ6QNDqiLhtcjN8Y_mhaplSQf2su0-ORmB56C9U3EYypKjlvEDUzIyIg5b4FNVfXAWR8Ncv3nfd4qo2mEBlBp7VY8vPmlyhMdlDSUL8avTd5vdE3e67rtcJVXvtkEG30YGpcoTmS93AA4A9B0xDMNdLMiY7DyPmyJjNRHyG_U"/>
<!-- Central Prominent Pin -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="relative map-pulse flex flex-col items-center animate-bounce duration-[1500ms]">
<span class="material-symbols-outlined text-primary text-[64px] pin-shadow" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
</div>
<!-- Glassmorphism overlay for map details -->
<div class="absolute bottom-10 left-1/2 -translate-x-1/2 px-4 py-2 bg-white/80 backdrop-blur-md rounded-xl border border-white/50 shadow-lg text-center whitespace-nowrap">
<p class="font-label-sm text-label-sm text-primary">Move map to adjust</p>
</div>
</div>
<!-- Bottom Sheet Panel (Bottom 55%) -->
<main class="flex-1 bg-surface-container-lowest rounded-t-[32px] shadow-[0_-10px_40px_rgba(0,0,0,0.08)] -mt-8 relative z-10 p-container-margin-mobile flex flex-col">
<!-- Handlebar -->
<div class="w-12 h-1.5 bg-surface-variant rounded-full mx-auto mb-6"></div>
<!-- Heading -->
<div class="mb-6">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-1">Set Your Delivery Location</h1>
<p class="font-body-md text-body-md text-secondary">We'll show restaurants near you</p>
</div>
<!-- Search Bar -->
<div class="relative mb-6">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">search</span>
</div>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all font-body-md text-on-surface placeholder:text-outline" placeholder="Search your area..." type="text"/>
</div>
<!-- Quick Select Chips -->
<div class="flex gap-sm overflow-x-auto custom-scrollbar mb-8 pb-1">
<button class="flex-none flex items-center gap-xs px-4 py-2 bg-surface-container-lowest border border-primary rounded-full text-primary hover:bg-primary-container transition-colors active:scale-95">
<span class="text-label-md font-label-md whitespace-nowrap">Use Current Location 📍</span>
</button>
<button class="flex-none flex items-center gap-xs px-4 py-2 bg-surface-container-lowest border border-outline-variant rounded-full text-on-surface-variant hover:bg-surface-container-highest transition-colors active:scale-95">
<span class="material-symbols-outlined text-[18px]">home</span>
<span class="text-label-md font-label-md">Home</span>
</button>
<button class="flex-none flex items-center gap-xs px-4 py-2 bg-surface-container-lowest border border-outline-variant rounded-full text-on-surface-variant hover:bg-surface-container-highest transition-colors active:scale-95">
<span class="material-symbols-outlined text-[18px]">work</span>
<span class="text-label-md font-label-md">Work</span>
</button>
</div>
<!-- Recent Addresses List -->
<div class="flex-1 space-y-4">
<h2 class="font-label-sm text-label-sm text-outline uppercase tracking-wider">Recent Searches</h2>
<div class="flex items-start gap-4 p-2 rounded-xl hover:bg-surface-container-low transition-colors cursor-pointer group">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center flex-none group-hover:bg-primary-container transition-colors">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary">location_on</span>
</div>
<div class="border-b border-outline-variant flex-1 pb-4">
<p class="font-title-lg text-title-lg text-on-surface leading-tight mb-0.5">Block 4, Vasant Kunj</p>
<p class="font-body-md text-body-md text-secondary">New Delhi</p>
</div>
</div>
<div class="flex items-start gap-4 p-2 rounded-xl hover:bg-surface-container-low transition-colors cursor-pointer group">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center flex-none group-hover:bg-primary-container transition-colors">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary">location_on</span>
</div>
<div class="border-b border-outline-variant flex-1 pb-4">
<p class="font-title-lg text-title-lg text-on-surface leading-tight mb-0.5">Connaught Place</p>
<p class="font-body-md text-body-md text-secondary">New Delhi</p>
</div>
</div>
</div>
<!-- Footer / Action Button -->
<div class="pt-6 mt-auto">
<button class="w-full bg-primary-container text-on-primary font-headline-md text-headline-md py-4 rounded-xl shadow-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                Confirm Location
            </button>
</div>
</main>
<!-- Bottom Navigation Mock (Only if needed, but the prompt asks for a location setup screen which usually hides global nav) -->
<!-- Navigation hidden to prioritize the location flow per UI instructions -->
<script>
        // Simple micro-interaction for chips
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                this.classList.add('scale-95');
                setTimeout(() => this.classList.remove('scale-95'), 150);
            });
        });
    </script>
</body></html>
