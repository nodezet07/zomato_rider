<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f9f9f9;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.3; }
            100% { transform: scale(1.3); opacity: 0; }
        }
        .animate-pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }
        .confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-primary": "#ffb59a",
                        "on-tertiary-fixed": "#002018",
                        "secondary-fixed": "#dde4e6",
                        "surface-variant": "#e2e2e2",
                        "surface-bright": "#f9f9f9",
                        "on-error-container": "#93000a",
                        "surface-container": "#eeeeee",
                        "outline": "#907065",
                        "on-secondary-fixed-variant": "#41484a",
                        "on-tertiary-container": "#003126",
                        "background": "#f9f9f9",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-background": "#1a1c1c",
                        "on-primary-container": "#511700",
                        "outline-variant": "#e4beb1",
                        "tertiary": "#006b55",
                        "on-primary-fixed": "#380d00",
                        "primary": "#a83900",
                        "primary-container": "#ff5a00",
                        "on-tertiary": "#ffffff",
                        "secondary": "#586062",
                        "inverse-on-surface": "#f1f1f1",
                        "on-surface": "#1a1c1c",
                        "on-surface-variant": "#5b4137",
                        "error": "#ba1a1a",
                        "primary-fixed-dim": "#ffb59a",
                        "on-primary": "#ffffff",
                        "surface": "#f9f9f9",
                        "primary-fixed": "#ffdbcf",
                        "on-secondary-fixed": "#161d1f",
                        "inverse-surface": "#2f3131",
                        "surface-tint": "#a83900",
                        "on-primary-fixed-variant": "#802900",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed-dim": "#c1c8ca",
                        "tertiary-container": "#00a584",
                        "surface-container-low": "#f3f3f3",
                        "on-secondary-container": "#5d6466",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#6dfad2",
                        "surface-container-high": "#e8e8e8",
                        "on-tertiary-fixed-variant": "#005140",
                        "surface-container-highest": "#e2e2e2",
                        "tertiary-fixed-dim": "#4bddb7",
                        "surface-dim": "#dadada",
                        "secondary-container": "#dae1e3"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "8px",
                        "base": "4px",
                        "container-margin-mobile": "16px",
                        "gutter": "16px",
                        "xl": "32px",
                        "xs": "4px",
                        "md": "16px",
                        "container-margin-desktop": "80px",
                        "lg": "24px"
                    },
                    "fontFamily": {
                        "title-lg": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "label-md": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "title-lg": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "display-lg": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest min-h-screen flex flex-col relative overflow-hidden">
<!-- Confetti Hint Particles -->
<div class="confetti-canvas">
<div class="absolute top-4 left-4 w-2 h-2 bg-primary-container rounded-full opacity-60"></div>
<div class="absolute top-12 left-10 w-3 h-3 bg-tertiary-container rotate-45 opacity-40"></div>
<div class="absolute top-6 right-6 w-2 h-2 bg-secondary-container rounded-full opacity-50"></div>
<div class="absolute top-16 right-12 w-3 h-1 bg-primary rotate-12 opacity-30"></div>
</div>
<!-- Top App Bar (Shared Component Logic) -->
<header class="w-full top-0 sticky bg-surface dark:bg-surface-dim border-b border-surface-variant dark:border-outline-variant flex items-center justify-between px-md py-sm w-full z-50">
<div class="cursor-pointer active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary dark:text-inverse-primary" data-icon="close">close</span>
</div>
<h1 class="font-title-lg text-title-lg text-primary dark:text-inverse-primary">Order Confirmed</h1>
<div class="w-6"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center px-container-margin-mobile pb-xl relative z-10">
<!-- Animated Success Icon -->
<div class="relative mb-lg">
<div class="absolute inset-0 animate-pulse-ring rounded-full border-4 border-tertiary"></div>
<div class="relative flex items-center justify-center w-24 h-24 bg-tertiary rounded-full shadow-lg">
<span class="material-symbols-outlined text-on-tertiary text-[48px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Order Information Header -->
<div class="text-center space-y-base mb-lg">
<h2 class="font-headline-md text-headline-md text-on-surface">Order Placed Successfully!</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Your food is being prepared by <span class="font-bold text-primary">Spice Garden</span></p>
<p class="font-label-sm text-label-sm text-secondary">Order ID: #QK10482</p>
</div>
<!-- Estimated Delivery Badge -->
<div class="bg-primary-fixed text-on-primary-fixed-variant px-lg py-sm rounded-full flex items-center gap-sm shadow-sm mb-xl transition-all hover:shadow-md cursor-default">
<span class="material-symbols-outlined text-[18px]">schedule</span>
<span class="font-label-md text-label-md">Estimated Delivery: 35 min</span>
</div>
<!-- Summary Card -->
<div class="w-full bg-surface-container-lowest border border-surface-variant rounded-xl p-md shadow-[0px_4px_20px_rgba(0,0,0,0.05)] mb-xl">
<div class="flex justify-between items-center mb-sm">
<h3 class="font-label-md text-label-md text-on-surface uppercase tracking-wider">Order Summary</h3>
<span class="material-symbols-outlined text-secondary text-[20px]">receipt_long</span>
</div>
<ul class="space-y-sm mb-md">
<li class="flex justify-between items-center font-body-md text-body-md text-on-secondary-container">
<span>Dal Makhani</span>
<span class="text-on-surface">1 × ₹350</span>
</li>
<li class="flex justify-between items-center font-body-md text-body-md text-on-secondary-container">
<span>Butter Naan</span>
<span class="text-on-surface">2 × ₹120</span>
</li>
<li class="flex justify-between items-center font-body-md text-body-md text-on-secondary-container">
<span>Gulab Jamun</span>
<span class="text-on-surface">1 × ₹163</span>
</li>
</ul>
<div class="pt-sm border-t border-dashed border-outline-variant flex justify-between items-center">
<span class="font-title-lg text-title-lg text-on-surface">Total</span>
<span class="font-headline-md text-headline-md text-primary">₹633</span>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full space-y-md">
<button class="w-full py-md bg-primary-container text-on-primary-container font-headline-md text-[18px] rounded-xl shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-sm">
                Track My Order
            </button>
<button class="w-full py-md bg-transparent border-2 border-primary-container text-primary-container font-headline-md text-[18px] rounded-xl active:scale-[0.98] transition-all">
                Go to Home
            </button>
</div>
</main>
<!-- Interactive Elements for UX Feel -->
<script>
        // Simple micro-interaction for buttons
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('touchstart', () => {
                button.style.transform = 'scale(0.97)';
            });
            button.addEventListener('touchend', () => {
                button.style.transform = 'scale(1)';
            });
        });

        // Add a slight parallax or hover effect to the icon ring for a modern feel
        document.addEventListener('mousemove', (e) => {
            const ring = document.querySelector('.animate-pulse-ring');
            if (ring) {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
                ring.parentElement.style.transform = `translate(${xAxis}px, ${yAxis}px)`;
            }
        });
    </script>
</body></html>
